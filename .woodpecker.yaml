when:
  branch: master
  event: push
steps:
  - name: test
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    commands:
      - uv sync --frozen
      - uv run pytest -q
  - name: build
    image: docker.test4x.com/xgfan/plugin-docker-buildx-check
    settings:
      repo: docker.test4x.com/xgfan/id-card-scanner
      registry: docker.test4x.com
      tags:
        - "${CI_COMMIT_BRANCH}-${CI_COMMIT_SHA:0:8}-${CI_PIPELINE_NUMBER}"
        - latest
      mtu: 1450
      cache_from: docker.test4x.com/xgfan/id-card-scanner:cache
      cache_to: docker.test4x.com/xgfan/id-card-scanner:cache
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
  - name: notify-success
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: success
  - name: notify-failure
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: failure
    when:
      - status: [failure]
