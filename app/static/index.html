<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>证件扫描</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪪</text></svg>">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; } /* 防止 display:grid/flex 等作者样式压过 hidden */
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: light-dark(#f5f5f7, #1c1c1e); color: light-dark(#1d1d1f, #f5f5f7);
    overflow: hidden;
  }
  main {
    display: grid;
    grid-template-columns: clamp(340px, 26vw, 480px) 1fr;
    gap: 20px;
    height: 100dvh;
    padding: 20px;
  }
  aside { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  h1 { font-size: 1.4rem; margin: 0; }
  #devbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: .9rem; color: light-dark(#6e6e73, #98989d);
  }
  #dev-dot { font-size: .7rem; }
  #dev-dot.ok { color: #34c759; }
  #dev-dot.bad { color: #d70015; }
  #hint { margin: 0; color: light-dark(#6e6e73, #98989d); min-height: 2.8em; font-size: .95rem; }
  #hint.error { color: #d70015; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    font-size: .95rem; padding: 9px 18px; border-radius: 10px; border: none;
    background: #0071e3; color: #fff; cursor: pointer;
  }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.ghost { background: transparent; color: #0071e3; border: 1px solid #0071e3; }
  button.small { font-size: .85rem; padding: 4px 12px; border-radius: 8px; }
  .spinner {
    display: none; width: 1em; height: 1em; margin-right: 8px; vertical-align: -2px;
    border: 2px solid #fff; border-top-color: transparent; border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  button.busy .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #picker {
    border: 1px solid light-dark(#d2d2d7, #3a3a3c); border-radius: 12px;
    padding: 12px 14px; background: light-dark(#fff, #2c2c2e);
  }
  #picker h2 { font-size: .95rem; margin: 0 0 8px; }
  #dev-list { list-style: none; margin: 0 0 8px; padding: 0; }
  #dev-list li {
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap;
  }
  #dev-list li:hover { background: light-dark(#f0f0f2, #3a3a3c); }
  #dev-list .model { color: light-dark(#6e6e73, #98989d); font-size: .82rem; }
  #picker .status { color: light-dark(#6e6e73, #98989d); font-size: .85rem; margin: 0 0 8px; }
  #picker .manual { display: flex; gap: 8px; margin-top: 8px; }
  #picker .manual input {
    flex: 1; font-size: .85rem; padding: 6px 10px; border-radius: 8px;
    border: 1px solid light-dark(#d2d2d7, #3a3a3c);
    background: light-dark(#fff, #1c1c1e); color: inherit;
  }
  .tip { margin-top: auto; font-size: .82rem; color: light-dark(#aeaeb2, #636366); }
  .warn { color: #b25000; font-weight: 600; }

  #viewer-pane { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .pane-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .tabs {
    display: flex; gap: 4px; padding: 4px; border-radius: 11px;
    background: light-dark(#e9e9ec, #2c2c2e);
  }
  .tab {
    background: transparent; color: inherit; border: none;
    padding: 6px 16px; border-radius: 8px; font-size: .9rem; cursor: pointer;
  }
  .tab.active {
    background: light-dark(#fff, #48484a);
    box-shadow: 0 1px 3px rgba(0, 0, 0, .15);
  }
  #download {
    font-size: .95rem; text-decoration: none; padding: 8px 18px;
    border-radius: 10px; background: #34c759; color: #fff;
  }
  #viewer {
    flex: 1; min-height: 0; position: relative; overflow: hidden;
    border-radius: 10px; background: light-dark(#e9e9ec, #2c2c2e);
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
  }
  #viewer.zoomed { cursor: grab; }
  #viewer.dragging { cursor: grabbing; }
  #view-img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    user-select: none; -webkit-user-select: none; will-change: transform;
  }
  #view-placeholder {
    color: light-dark(#aeaeb2, #636366); font-size: .95rem;
    border: 2px dashed light-dark(#c7c7cc, #48484a); border-radius: 10px;
    padding: 40px 60px;
  }
  @media (max-width: 900px) {
    body { overflow: auto; }
    main { display: flex; flex-direction: column; height: auto; }
    #viewer { height: 70vh; flex: none; }
    .tip { margin-top: 0; }
  }
</style>
</head>
<body>
<main>
  <aside>
    <h1>证件扫描</h1>
    <div id="devbar">
      设备：<span id="dev-name">未选择</span>
      <span id="dev-dot" class="bad">●</span>
      <button id="btn-dev" class="ghost small">更换设备</button>
    </div>

    <section id="picker" hidden>
      <h2>选择扫描仪</h2>
      <ul id="dev-list"></ul>
      <p class="status" id="picker-status"></p>
      <button id="btn-refresh" class="ghost small">重新搜索</button>
      <div class="manual">
        <input id="dev-url" type="text" placeholder="或手动输入设备地址，如 http://192.168.1.100:8080">
        <button id="btn-manual" class="ghost small">连接</button>
      </div>
    </section>

    <p id="hint"></p>

    <div class="actions">
      <button id="btn-front" disabled><span class="spinner"></span><span class="label">扫描正面</span></button>
      <button id="btn-back" disabled><span class="spinner"></span><span class="label">扫描反面</span></button>
      <button id="btn-reset" class="ghost">重新开始</button>
    </div>

    <p class="tip">预览区内：触摸板捏合或 Ctrl+滚轮缩放，缩放后可拖拽/双指平移，双击复位</p>
  </aside>

  <section id="viewer-pane">
    <div class="pane-head">
      <nav class="tabs">
        <button class="tab" data-tab="front">正面扫描结果<span id="tabwarn-front" class="warn" hidden> ⚠</span></button>
        <button class="tab" data-tab="back">反面扫描结果<span id="tabwarn-back" class="warn" hidden> ⚠</span></button>
        <button class="tab" data-tab="composite">复印件预览</button>
      </nav>
      <a id="download" href="/api/pdf" download hidden>下载 PDF</a>
    </div>
    <div id="viewer">
      <img id="view-img" alt="预览" draggable="false" hidden>
      <div id="view-placeholder">未扫描</div>
    </div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const buttons = { front: $('btn-front'), back: $('btn-back') };
let scanning = false;
let deviceOk = false;
let lastState = { front: null, back: null };

const IDLE_HINT = '把证件放在玻璃板上，点「扫描正面」';

function setHint(text, isError = false) {
  $('hint').textContent = text;
  $('hint').classList.toggle('error', isError);
}

/* ---------- Tab 与查看器 ---------- */

const viewer = $('viewer');
const viewImg = $('view-img');
const view = { tab: 'front', scale: 1, tx: 0, ty: 0 };

const TAB_SRC = {
  front: (s) => s.front && `/api/preview/front?t=${s.front.ts}`,
  back: (s) => s.back && `/api/preview/back?t=${s.back.ts}`,
  composite: (s) => s.front && s.back && `/api/composite?t=${s.front.ts}-${s.back.ts}`,
};
const TAB_EMPTY = {
  front: '正面还未扫描',
  back: '反面还未扫描',
  composite: '正反面都扫描完成后，这里会显示合成的 A4 复印件',
};

function applyTransform() {
  viewImg.style.transform = `translate(${view.tx}px, ${view.ty}px) scale(${view.scale})`;
  viewer.classList.toggle('zoomed', view.scale > 1);
}

function resetView() {
  view.scale = 1; view.tx = 0; view.ty = 0;
  applyTransform();
}

function showTab(tab) {
  view.tab = tab;
  for (const el of document.querySelectorAll('.tab')) {
    el.classList.toggle('active', el.dataset.tab === tab);
  }
  refreshViewer();
}

function refreshViewer() {
  const src = TAB_SRC[view.tab](lastState);
  if (src) {
    if (viewImg.dataset.src !== src) {
      viewImg.dataset.src = src;
      viewImg.src = src;
      resetView();
    }
    viewImg.hidden = false;
    $('view-placeholder').hidden = true;
  } else {
    viewImg.hidden = true;
    viewImg.dataset.src = '';
    $('view-placeholder').textContent = TAB_EMPTY[view.tab];
    $('view-placeholder').hidden = false;
    resetView();
  }
}

/* 缩放：触摸板捏合在 macOS/Chrome 上映射为 ctrlKey 的 wheel 事件 */
viewer.addEventListener('wheel', (e) => {
  e.preventDefault(); // 阻止页面级缩放/回弹
  if (viewImg.hidden) return;
  const rect = viewer.getBoundingClientRect();
  if (e.ctrlKey || e.metaKey) {
    const cx = e.clientX - rect.left - rect.width / 2;
    const cy = e.clientY - rect.top - rect.height / 2;
    const next = Math.min(8, Math.max(1, view.scale * Math.exp(-e.deltaY * 0.01)));
    const k = next / view.scale;
    view.tx = cx - k * (cx - view.tx);
    view.ty = cy - k * (cy - view.ty);
    view.scale = next;
    if (next === 1) { view.tx = 0; view.ty = 0; }
    _clampPan(rect);
    applyTransform();
  } else if (view.scale > 1) {
    view.tx -= e.deltaX;
    view.ty -= e.deltaY;
    _clampPan(rect);
    applyTransform();
  }
}, { passive: false });

function _clampPan(rect) {
  const maxX = (rect.width * view.scale) / 2;
  const maxY = (rect.height * view.scale) / 2;
  view.tx = Math.min(maxX, Math.max(-maxX, view.tx));
  view.ty = Math.min(maxY, Math.max(-maxY, view.ty));
}

let drag = null;
viewer.addEventListener('pointerdown', (e) => {
  if (view.scale <= 1 || viewImg.hidden) return;
  drag = { x: e.clientX, y: e.clientY };
  viewer.setPointerCapture(e.pointerId);
  viewer.classList.add('dragging');
});
viewer.addEventListener('pointermove', (e) => {
  if (!drag) return;
  view.tx += e.clientX - drag.x;
  view.ty += e.clientY - drag.y;
  drag = { x: e.clientX, y: e.clientY };
  _clampPan(viewer.getBoundingClientRect());
  applyTransform();
});
const endDrag = () => { drag = null; viewer.classList.remove('dragging'); };
viewer.addEventListener('pointerup', endDrag);
viewer.addEventListener('pointercancel', endDrag);
viewer.addEventListener('dblclick', resetView);
document.querySelectorAll('.tab').forEach((el) =>
  el.addEventListener('click', () => showTab(el.dataset.tab)));

/* ---------- 状态渲染 ---------- */

function renderDevice(info) {
  deviceOk = !!(info.device && info.available);
  $('dev-name').textContent = info.device
    ? info.device.name + (info.device.location ? `（${info.device.location}）` : '')
    : '未选择';
  $('dev-dot').className = deviceOk ? 'ok' : 'bad';
  render(lastState);
}

function render(state) {
  lastState = state;
  for (const side of ['front', 'back']) {
    const entry = state[side];
    $('tabwarn-' + side).hidden = !entry || entry.detected;
    buttons[side].querySelector('.label').textContent = entry
      ? (side === 'front' ? '重扫正面' : '重扫反面')
      : (side === 'front' ? '扫描正面' : '扫描反面');
  }
  buttons.front.disabled = scanning || !deviceOk;
  buttons.back.disabled = scanning || !deviceOk || !state.front;

  const done = state.front && state.back;
  $('download').hidden = !done;
  if (done) {
    const bad = !state.front.detected || !state.back.detected;
    setHint(bad ? '已生成复印件，但有一面未识别到证件边缘（用的是整幅原图），建议重扫那一面'
                : '完成！可以下载 PDF，也可以单面重扫');
  } else if (!deviceOk) {
    setHint('请先在上方选择一台可用的扫描仪');
  } else if (state.front) {
    setHint('请把证件翻面，再点「扫描反面」');
  } else {
    setHint(IDLE_HINT);
  }
  refreshViewer();
}

async function scan(side) {
  if (scanning) return;
  scanning = true;
  buttons.front.disabled = buttons.back.disabled = true;
  buttons[side].classList.add('busy');
  setHint('扫描中… 请不要移动证件（约 20 秒）');
  try {
    const resp = await fetch(`/api/scan/${side}`, { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `扫描失败（HTTP ${resp.status}）`);
    }
    const state = await resp.json();
    scanning = false;
    lastState = state;
    // 扫完自动切到最新内容：两面齐备 → 复印件，否则刚扫的那面
    showTab(state.front && state.back ? 'composite' : side);
    render(state);
  } catch (e) {
    const state = await fetchState();
    scanning = false;
    render(state);
    setHint(e.message, true);
  } finally {
    buttons[side].classList.remove('busy');
  }
}

async function fetchState() {
  try { return await (await fetch('/api/state')).json(); }
  catch { return { front: null, back: null }; }
}

async function openPicker() {
  $('picker').hidden = false;
  $('dev-list').innerHTML = '';
  $('picker-status').textContent = '正在搜索局域网内的扫描仪…';
  try {
    const { devices } = await (await fetch('/api/devices/discover')).json();
    $('picker-status').textContent = devices.length
      ? '点击选择：' : '没有找到设备。确认打印机开机且与本机同一网络，或在下方手动输入地址。';
    for (const dev of devices) {
      const li = document.createElement('li');
      const name = document.createElement('strong');
      name.textContent = dev.name + (dev.location ? `（${dev.location}）` : '');
      const model = document.createElement('span');
      model.className = 'model';
      model.textContent = dev.model || dev.url;
      li.append(name, model);
      li.addEventListener('click', () => selectDevice(dev));
      $('dev-list').appendChild(li);
    }
  } catch {
    $('picker-status').textContent = '搜索失败，请重试。';
  }
}

async function selectDevice(dev) {
  $('picker-status').textContent = `正在连接 ${dev.name}…`;
  try {
    const resp = await fetch('/api/device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dev),
    });
    const info = await resp.json();
    renderDevice(info);
    if (info.available) {
      $('picker').hidden = true;
    } else {
      $('picker-status').textContent = '该设备当前无法连接，请换一台或重新搜索。';
    }
  } catch {
    $('picker-status').textContent = '设置设备失败，请重试。';
  }
}

buttons.front.addEventListener('click', () => scan('front'));
buttons.back.addEventListener('click', () => scan('back'));
$('btn-reset').addEventListener('click', async () => {
  if (scanning) return;
  const state = await (await fetch('/api/reset', { method: 'POST' })).json();
  showTab('front');
  render(state);
});
$('btn-dev').addEventListener('click', openPicker);
$('btn-refresh').addEventListener('click', openPicker);
$('btn-manual').addEventListener('click', () => {
  const url = $('dev-url').value.trim();
  if (!url) return;
  let name;
  try { name = new URL(url).hostname; }
  catch { $('picker-status').textContent = '地址格式不对，需要形如 http://192.168.1.100:8080'; return; }
  selectDevice({ name, url, model: '', location: '' });
});

(async () => {
  const state = await fetchState();
  lastState = state;
  showTab(state.front && state.back ? 'composite' : 'front');
  render(state);
  try {
    const info = await (await fetch('/api/device')).json();
    renderDevice(info);
    if (!info.device || !info.available) {
      setHint(info.device
        ? `上次使用的「${info.device.name}」当前不可用，请重新选择设备`
        : '首次使用，请先选择扫描仪', !!info.device);
      openPicker();
    }
  } catch {
    setHint('无法获取设备状态', true);
  }
})();
</script>
</body>
</html>
